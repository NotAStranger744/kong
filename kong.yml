_format_version: "3.0"
_transform: true

services:
  - name: joke-service
    url: http://10.0.0.4:3000
    routes:
      - name: root-redirect
        paths:
          - /
        plugins:
          - name: pre-function
            config:
              access:
                #redirect / to /joke
                - 'if kong.request.get_path() == "/" then return kong.response.exit(301, "Redirecting...", {["Location"] = "/joke"}) end'
      - name: joke-api
        paths:
          - /joke
        strip_path: false
        plugins:
          - name: rate-limiting
            config:
              minute: 5
              policy: local
      - name: joke-docs
        paths:
          - /joke/docs
        strip_path: false

  - name: submit-service
    url: http://10.0.0.6:3001
    routes:
      - name: submit-ui
        paths:
          - /submit
          - /types #for caching joke categories
        strip_path: false

  - name: rabbitmq-management
    url: http://10.0.0.6:15672
    routes:
      - name: rabbitmq-ui
        paths:
          - /rabbitmq
        strip_path: true
    plugins:
      - name: pre-function
        config:
          access: #redirect /rabbitmq to /rabbitmq/
            - 'if kong.request.get_path() == "/rabbitmq" then return kong.response.exit(301, "Redirecting...", {["Location"] = "/rabbitmq/"}) end'