_format_version: "3.0"
_transform: true

services:
  - name: joke-service
    url: http://10.0.0.4:3000
    routes:
      - name: joke-api
        paths:
          - /joke
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 5
          policy: local

  - name: submit-service
    url: http://10.0.0.6:3001
    routes:
      - name: submit-ui-and-api
        paths:
          - /
        strip_path: false