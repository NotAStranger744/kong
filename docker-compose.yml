version: '3.8'
services:
  kong:
    image: kong:latest
    container_name: kong-gateway
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_SSL_CERT: /usr/local/kong/ssl/kong.crt
      KONG_SSL_CERT_KEY: /usr/local/kong/ssl/kong.key
      KONG_LOG_LEVEL: notice
    volumes:
      - ./kong.yml:/usr/local/kong/declarative/kong.yml
      - ./ssl:/usr/local/kong/ssl
    ports:
      - "80:8000"
      - "443:8443"
    restart: always

networks:
  default:
    name: kong-network